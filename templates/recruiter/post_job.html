{% extends 'base.html' %}
{% block title %}Post a Job{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto pb-20">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-white font-['Space_Grotesk']">Post a Job</h1>
    <p class="text-slate-400 text-sm mt-1">Attract verified, skill-tested candidates</p>
  </div>
  <div class="glass-card rounded-2xl p-8">
    <form method="POST" action="{{ url_for('recruiter_post_job') }}" class="space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Job Title *</label>
          <input name="title" type="text" required placeholder="e.g. Python Backend Developer" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50"/>
        </div>
        <div>
          <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Company Name</label>
          <input name="company" type="text" placeholder="e.g. TechCorp India" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50"/>
        </div>
        <div>
          <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Location</label>
          <input name="location" type="text" placeholder="e.g. Bangalore / Remote" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50"/>
        </div>
        <div>
          <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Job Type</label>
          <select name="type" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50">
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Internship">Internship</option>
            <option value="Contract">Contract</option>
            <option value="Remote">Remote</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Required Skills (comma separated)</label>
        <input name="skills" type="text" placeholder="Python, Django, SQL, REST APIs" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50"/>
        <p class="text-slate-600 text-xs mt-1">Students with these verified skills will be matched to this job.</p>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Job Description</label>
        <textarea name="description" rows="4" placeholder="Describe the role, responsibilities, and requirements…" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50 resize-none"></textarea>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Application Link</label>
        <input name="link" type="url" placeholder="https://yourcompany.com/careers/apply" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50"/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-['Space_Grotesk'] font-bold rounded-xl hover:brightness-110 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-base">publish</span>Post Job
        </button>
        <a href="{{ url_for('recruiter_dashboard') }}" class="px-6 py-3 border border-white/10 text-slate-400 font-['Space_Grotesk'] font-bold rounded-xl hover:text-white hover:border-white/20 transition-all text-sm flex items-center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
