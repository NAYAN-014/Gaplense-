{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto pb-20">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-white font-['Space_Grotesk']">Edit Profile</h1>
    <p class="text-slate-400 text-sm mt-1">Update your personal information</p>
  </div>
  <div class="glass-card rounded-2xl p-8">
    <form method="POST" action="{{ url_for('edit_profile') }}" class="space-y-5">
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Full Name</label>
        <input name="name" type="text" value="{{ user.name or '' }}" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50" required/>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">College / University</label>
        <input name="college" type="text" value="{{ user.college or '' }}" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50" placeholder="e.g. SGSITS Indore"/>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Skills (comma separated)</label>
        <input name="skills" type="text" value="{{ user.skills|join(', ') if user.skills else '' }}" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50" placeholder="Python, JavaScript, SQL"/>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">Bio</label>
        <textarea name="bio" rows="3" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50 resize-none" placeholder="Tell recruiters about yourself…">{{ user.bio or '' }}</textarea>
      </div>
      <div>
        <label class="block text-xs font-['Space_Grotesk'] font-bold text-slate-400 uppercase tracking-wider mb-2">LinkedIn URL</label>
        <input name="linkedin" type="url" value="{{ user.linkedin or '' }}" class="w-full bg-surface-container border border-white/10 rounded-xl px-4 py-3 text-white text-sm font-['Inter'] outline-none focus:border-cyan-500/50" placeholder="https://linkedin.com/in/yourprofile"/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-['Space_Grotesk'] font-bold rounded-xl hover:brightness-110 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-base">save</span>Save Changes
        </button>
        <a href="{{ url_for('student_dashboard') }}" class="px-6 py-3 border border-white/10 text-slate-400 font-['Space_Grotesk'] font-bold rounded-xl hover:text-white hover:border-white/20 transition-all text-sm flex items-center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
