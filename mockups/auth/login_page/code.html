<style>
        .glass-card {
            background: rgba(16, 20, 21, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
        }
        .glass-card::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .mesh-gradient {
            background-color: #0b0f10;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 219, 233, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(182, 0, 248, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(0, 105, 112, 0.05) 0px, transparent 80%);
        }
        .custom-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(132, 148, 149, 0.3);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            outline: none;
            border-bottom-color: #00f0ff;
            box-shadow: 0 4px 12px -6px rgba(0, 240, 255, 0.4);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
    </style>

<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 mesh-gradient -z-10 h-full w-full"></div>
<div class="fixed inset-0 -z-10 opacity-10 pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB6j-NEhavypxjJUDdRnloghbh1XmsNinYjai87W0pr75nodGcsCxl6E38ADNMsjcL-Yw3EoLOLO-M-heCHBxO-o9Ax6bhB8qkw55ycsZNZR66a8jBm1_k3ujL-wtl-ykyr840x10SIwkXf7y0dOtQ4PNBcty6Q-k5yXyW8qX0sMSqNcvNBuhBBRhlV1oZndl33M1GU0KW4C65dASP0s3Z8T3bxVLjKEcnkFtYaxYPaceS8iemLznjmhMZaVgfniume0WOkkdCmtM1S');">
</div>
<main class="relative flex min-h-screen items-center justify-center p-6 sm:p-12">
<!-- Decoration: Floating Orbs -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary-container/5 blur-[120px] rounded-full"></div>
<!-- Central Login Container -->
<div class="w-full max-w-[480px]">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 mb-4 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-[0_0_20px_rgba(0,240,255,0.4)]">
<span class="material-symbols-outlined text-on-primary text-3xl" data-weight="fill">lens</span>
</div>
<h1 class="font-headline-md text-headline-md text-white tracking-tight">Sign into GapLens</h1>
<p class="font-body-md text-on-surface-variant mt-2">Enter your credentials to access your terminal</p>
</div>
<!-- Login Card -->
<div class="glass-card relative p-8 sm:p-10 rounded-2xl">
<form action="#" class="space-y-8" method="POST">
<!-- Username/Email Field -->
<div class="relative flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-zinc-500 flex items-center gap-2" for="username">
<span class="material-symbols-outlined text-[16px]">person</span>
                            USERNAME OR EMAIL
                        </label>
<input class="custom-input font-body-lg text-body-lg text-white py-2 px-1 placeholder:text-zinc-700" id="username" name="username" placeholder="alex@quantum.io" type="text"/>
</div>
<!-- Password Field -->
<div class="relative flex flex-col space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-zinc-500 flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[16px]">lock</span>
                                PASSWORD
                            </label>
<a class="font-label-caps text-[10px] text-primary-container hover:text-white transition-colors" href="#">FORGOT?</a>
</div>
<input class="custom-input font-body-lg text-body-lg text-white py-2 px-1 placeholder:text-zinc-700" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Actions -->
<div class="pt-2 space-y-4">
<button class="w-full h-14 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-lg font-headline-sm text-on-primary flex items-center justify-center gap-2 btn-glow transition-all active:scale-95" type="submit">
                            AUTHENTICATE
                            <span class="material-symbols-outlined text-xl">login</span>
</button>
<div class="relative py-2 flex items-center">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 font-label-caps text-[10px] text-zinc-600">SECURE THIRD PARTY</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<button class="w-full h-14 bg-white/5 border border-white/10 rounded-lg font-body-md text-white flex items-center justify-center gap-3 hover:bg-white/10 transition-all active:scale-95" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google multicolored G logo on a transparent background for authentication button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClaIp6Jx3UnOucjznaAMLqxf4-MRO2JuIoqIcBpmWSJ7nQcLCpSN17njABE5l6w67YaY3zTsek7rT77JDRZjq73E68l_Jhk9krNdLW41qtatdpqH91s-wUvUK0_M9lP5Wfnrx81OKDhc80PYpmRrFM2FA4XUU1nIxKSJy1JgWk936a-Kogilmf_hfxlnjurf9ZJHCZS7a2cPQJ9YDjVJMjSICMo7eVVIeRT2Dw0nPxWZeJ-nA7uVWjtifRDie30F_xEmH7viwKrFNz"/>
                            Sign in with Google
                        </button>
</div>
</form>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="font-body-md text-zinc-500">
                    New to the laboratory? 
                    <a class="text-primary-container hover:underline font-medium" href="#">Create an Account</a>
</p>
<div class="mt-6 flex justify-center gap-6">
<a class="font-label-caps text-[10px] text-zinc-700 hover:text-zinc-400" href="#">PRIVACY POLICY</a>
<a class="font-label-caps text-[10px] text-zinc-700 hover:text-zinc-400" href="#">TERMS OF SERVICE</a>
</div>
</div>
</div>
</main>
<!-- Visual Anchor Decorations -->
<div class="fixed bottom-8 left-8 hidden lg:block opacity-30">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div>
<span class="font-label-caps text-[10px] text-cyan-400">SYSTEM STATUS: OPTIMAL</span>
</div>
</div>
<div class="fixed bottom-8 right-8 hidden lg:block opacity-30">
<span class="font-label-caps text-[10px] text-zinc-600">GPL-CORE VERSION 2.4.0-STABLE</span>
</div>
